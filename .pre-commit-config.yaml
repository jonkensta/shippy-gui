repos:
  - repo: local
    hooks:
      - id: pylint
        name: pylint (uv)
        entry: uv run pylint src
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy (uv)
        entry: uv run mypy src
        language: system
        pass_filenames: false
      - id: black-check
        name: black --check (uv)
        entry: uv run black --check src
        language: system
        pass_filenames: false
      - id: unittest
        name: unittest (uv)
        entry: env QT_QPA_PLATFORM=offscreen uv run python -m unittest discover -s tests
        language: system
        pass_filenames: false
